                            finalUrl = `https://lh3.googleusercontent.com/d/${match[1]}`;
                        }
                        setBannerImage(finalUrl); 
                        toggleBannerVisibility(true);
                        fetchAPI({ action: 'saveBannerImage', imageUrl: finalUrl });
                    } 
                    setShowBannerModal(false); 
                    setTempBannerUrl(''); 
                }} className="backdrop-blur-xl w-full max-w-xs rounded-[35px] p-6 shadow-2xl animate-slideUp" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                   <h3 className="text-sm font-black mb-4 text-center" style={{ color: '#fff9e8' }}>เปลี่ยนแบนเนอร์</h3>
                   <div className="space-y-2">
                     <input type="url" required value={tempBannerUrl} onChange={(e) => setTempBannerUrl(e.target.value)} className="w-full p-3.5 rounded-2xl border outline-none text-[11px] shadow-sm transition-all text-center" style={{ backgroundColor: '#FFFFFF', color: '#FF9BC9', borderColor: COLORS.cardBorder }} placeholder="วางลิงก์รูปภาพ Google Drive..." />
                     <button type="submit" className="w-full py-3.5 rounded-2xl font-black text-xs mt-3 shadow-lg active:scale-95 transition-all" style={{ backgroundColor: '#FFF1CA', color: '#FF9BC9' }}>Save Banner</button>
                     <button type="button" onClick={() => { setShowBannerModal(false); setTempBannerUrl(''); }} className="w-full text-[9px] font-bold mt-1 uppercase tracking-widest" style={{ color: '#fff9e8' }}>Close</button>
                   </div>
                </form>
              </div>
            )}

            {/* ==========================================
                🗑️ MODAL: ยืนยันการลบงาน
                ========================================== */}
            {taskToDelete && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 backdrop-blur-[2px] animate-fadeIn" style={{ backgroundColor: 'rgba(243,82,141,0.8)' }}>
                <div className="backdrop-blur-xl w-full max-w-[260px] rounded-[30px] p-6 shadow-2xl animate-slideUp text-center" style={{ backgroundColor: `${COLORS.modalBg}f2`, borderWidth: '1px', borderColor: COLORS.cardBorder }}>
                  <div className="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm border" style={{ backgroundColor: '#FFFFFF', color: '#FF9BC9', borderColor: COLORS.cardBorder }}>
                     <IconTrash size={26} />
                  </div>
                  <h3 className="text-[14px] font-black mb-1" style={{ color: '#fff9e8' }}>ยืนยันการลบ?</h3>
                  <p className="text-[10px] font-bold mb-5" style={{ color: '#fff9e8' }}>คุณต้องการลบคิวงานนี้ใช่หรือไม่<br/>(ไม่สามารถกู้คืนได้)</p>
                  
                  <div className="flex gap-2">
                    <button onClick={() => setTaskToDelete(null)} className="flex-1 py-3 rounded-2xl font-black text-[10px] active:scale-95 transition-all shadow-sm border" style={{ backgroundColor: '#FFFFFF', color: '#FF9BC9', borderColor: COLORS.cardBorder }}>ยกเลิก</button>
                    <button onClick={executeDeleteTask} className="flex-1 py-3 rounded-2xl font-black text-[10px] active:scale-95 transition-all shadow-sm" style={{ backgroundColor: '#FFF1CA', color: '#FF9BC9' }}>ลบข้อมูล</button>
                  </div>
                </div>
              </div>
            )}

          </div>
          
          <style>{`
            @keyframes steam {
              0% { transform: translateY(50px) translateX(0) scale(0.8); opacity: 0; }
              20% { opacity: 0.8; }
              50% { transform: translateY(-150px) translateX(20px) scale(1.2); }
              80% { opacity: 0.4; }
              100% { transform: translateY(-300px) translateX(-20px) scale(1.5); opacity: 0; }
            }
            .animate-steam { animation: steam 10s ease-in-out infinite; }

            /* ✨ อนิเมชั่นกระพริบวิบวับแบบขยายร่างขึ้นลง */
            @keyframes twinkle {
                0%, 100% { opacity: 0.2; transform: scale(0.6); }
                50% { opacity: 1; transform: scale(1.2); }
            }
            .animate-twinkle { animation: twinkle 1.5s ease-in-out infinite; }

            /* 👆 อนิเมชั่นตอบสนองเมื่อคลิก */
            @keyframes clickRipple {
                0% { opacity: 1; transform: translate(-50%, -50%) scale(0); border-width: 4px; }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(4); border-width: 1px; }
            }
            .animate-clickRipple { animation: clickRipple 0.5s ease-out forwards; }

            /* 💧 อนิเมชั่นน้ำไหลระยิบระยับในหลอด Progress */
            .water-effect {
                background-image: 
                    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 1px, transparent 2px),
                    radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.6) 1.5px, transparent 2.5px),
                    linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
                background-size: 12px 12px, 16px 16px, 200% 100%;
                animation: water-sparkle-move 1.5s linear infinite;
            }
            @keyframes water-sparkle-move {
                0% { background-position: 0 0, 0 0, 200% 0; }
                100% { background-position: -12px -12px, -16px -16px, -200% 0; }
            }

            /* 🐰 อนิเมชั่นหัวกระต่ายขยับดุ๊กดิ๊กเบาๆ */
            @keyframes bunny-run {
                0%, 100% { transform: translateY(0px) rotate(-2deg); }
                50% { transform: translateY(-1.5px) rotate(2deg); }
            }
            .animate-bunny-run { animation: bunny-run 1.2s ease-in-out infinite; }

            @keyframes float { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(25px, -15px); } }
            @keyframes float-reverse { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-25px, 15px); } }
            @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            @keyframes float-particle-1 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-20px); opacity: 0; } }
            @keyframes float-particle-2 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-15px) translateX(5px); opacity: 0; } }
            @keyframes float-particle-3 { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-25px) translateX(-5px); opacity: 0; } }
            @keyframes bounce-slow { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
            @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
            @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
            @keyframes text-wave { 0%, 20%, 100% { transform: translateY(0px); } 10% { transform: translateY(-5px); } }
            @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
            .animate-text-wave { animation: text-wave 4s ease-in-out infinite; }
            .animate-breathe { animation: breathe 4s ease-in-out infinite; transform-origin: center; }
            .animate-float-particle-1 { animation: float-particle-1 3s ease-out infinite; }
            .animate-float-particle-2 { animation: float-particle-2 4s ease-out infinite 1s; }
            .animate-float-particle-3 { animation: float-particle-3 3.5s ease-out infinite 0.5s; }
            .animate-float { animation: float 15s ease-in-out infinite; }
            .animate-float-reverse { animation: float-reverse 18s ease-in-out infinite; }
            .animate-bounce-slow { animation: bounce-slow 4s ease-in-out infinite; }
            .animate-slideUp { animation: slideUp 0.3s ease-out; }
            .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
            .animate-spin-slow { animation: spin-slow 4s linear infinite; }
            input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8) sepia(1) saturate(0) hue-rotate(180deg); }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
